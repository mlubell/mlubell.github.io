<nav class="nav" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
  <ul class="nav__list nav__list--header" style="margin: 0; padding: 0; list-style: none;">
    <li class="nav__item nav__item--header">
      <a href="{{ "/" | relative_url }}" class="nav__link nav__link--header" style="font-weight: bold;">{{ site.title }}</a>
    </li>
  </ul>
  <ul class="nav__list nav__list--header" style="margin: 0; padding: 0; list-style: none; display: flex; gap: 1rem;">
    {% for item in site.navigation_header %}
      {% unless item.url == "/" %}
        <li class="nav__item nav__item--header">
          <a href="{{ item.url | relative_url }}" class="nav__link nav__link--header">{{ item.title }}</a>
        </li>
      {% endunless %}
    {% endfor %}
  </ul>
</nav>
